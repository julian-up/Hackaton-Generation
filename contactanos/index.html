<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:ital,wght@0,100..900;1,100..900&family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />

    <title>Contacto</title>
  </head>
  <body>
    <header class="nav">
      <a
        href="/index.html"
        class="logo"
        style="text-decoration: none; color: inherit"
      >
        Trendy<em>Shop</em>
      </a>
      <nav class="nav__links">
        <a href="/catalogo/index.html">Catálogo</a>
        <a href="/quienes-somos/index.html">Quiénes Somos</a>
        <a href="/contactanos/index.html">Contacto</a>

        <a
          href="/carrito/index.html"
          class="bag"
          style="text-decoration: none; color: inherit"
        >
          Carrito <span class="bag__count">0</span>
        </a>
      </nav>
    </header>

    <main>
      <section>
        <h2>Formulario de contacto</h2>

        <form
          id="form-contacto"
          action="https://formspree.io/f/mgobgkaq"
          method="post"
        >
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" required />

          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" required />

          <label for="mensaje">Mensaje</label>
          <textarea id="mensaje" name="mensaje" rows="4" required></textarea>

          <button type="submit">Enviar</button>
        </form>

        <p id="form-status"></p>
      </section>
    </main>
	<footer class="footer">
      <div class="footer__top">
        <div>
          <a
            href="/index.html"
            class="footer__brand"
            style="text-decoration: none; color: inherit"
          >
            Trendy<em style="font-style: italic; color: var(--rozy)">Shop</em>
          </a>
          <p>
            Boutique femenina de prendas atemporales. Hecho con calma, pensado
            para durar.
          </p>
        </div>
        <div class="footer__cols">
          <div class="footer__col">
            <b>Tienda</b>
            <a href="/catalogo/index.html">Catálogo</a>
            <a href="/catalogo/index.html">Novedades</a>
            <a href="/catalogo/index.html">Lookbook</a>
          </div>
          <div class="footer__col">
            <b>Marca</b>
            <a href="/quienes-somos/index.html">Quiénes Somos</a>
            <a href="/contactanos/index.html">Contacto</a>
            <a href="#">Envíos</a>
          </div>
        </div>
      </div>
      <div class="footer__legal">
        © 2026 TrendyShop · Todos los derechos reservados
      </div>
    </footer>

    <script src="../js/contactanos.js"></script>
  </body>
</html>
