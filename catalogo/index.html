<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trendy-Shope</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <header>
      <div>
        <h1>Trendy-Shope</h1>
        <p>Moda Femenina</p>
      </div>
      <nav class="menu">
        <ul>
          <li><a href="#">Catálogo</a></li>
          <li><a href="#">Quiénes somos</a></li>
          <li><a href="#">Contáctenos</a></li>
        </ul>
      </nav>
      <div class="cart">
        <a href="../carrito/index.html">
          <img src="../img/carrito-de-compras.png" alt="" /><span
            id="contador-carrito"
            >0</span
          >
        </a>
      </div>
    </header>
    <section class="coleccion">
      <div class="coleccion-content">
        <span>COLECCIÓN OTOÑO 2026</span>
        <h1>
          Elegancia en <br />
          cada detalle
        </h1>
        <p>
          Prendas atemporales en tonos crema, arena y borgoña. Diseñadas para la
          mujer que viste con intención.
        </p>
        <div class="coleccion-buttons">
          <a href="#" class="btn-primary">Ver catálogo</a>
          <a href="#" class="btn-secondary">Conócenos</a>
        </div>
      </div>

      <div class="coleccion-image">
        <img src="../img/modelo.jpg" alt="Colección Otoño" />
      </div>
    </section>

    <section class="catalogo">
      <div class="catalogo-header">
        <span>NUESTRA SELECCIÓN</span>
        <h2>Catálogo</h2>

        <div class="filtros">
          <button class="activo" id="activo">Todo</button>
          <button id="vestidos">Vestidos</button>
          <button id="blusas">Blusas</button>
          <button id="abrigos">Abrigos</button>
          <button id="faldas">Faldas</button>
          <button id="pantalones">Pantalones</button>
        </div>
      </div>

      <div class="productos" id="productos"></div>
    </section>

    <script src="../js/productos.js"></script>
  </body>
</html>
